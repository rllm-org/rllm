# @package _global_

# Verl Backend Configuration for rLLM.
# Loads verl's ppo_trainer.yaml as defaults; rllm-namespaced values are
# propagated to verl-native keys at runtime by ``sync_config``
# in ``rllm/experimental/verl/utils.py`` — except when the user explicitly
# overrode the verl-native key on the CLI (detected via Hydra overrides).

defaults:
  - /ppo_trainer
  - _self_

actor_rollout_ref:
  actor:
    use_rollout_log_probs: True
  rollout:
    mode: async
    agent:
      num_workers: 0
    calculate_log_probs: True
    val_kwargs:
      do_sample: True

data:
  gen_batch_size: ${mul:${data.train_batch_size},${rllm.rejection_sample.multiplier}}
  return_multi_modal_inputs: False

rllm:
  backend: verl
  algorithm:
    rollout_correction:
      bypass_mode: False

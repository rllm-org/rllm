# @package _global_

# Verl Backend Configuration for rLLM
# Loads verl's ppo_trainer.yaml as defaults, then applies rLLM-specific overrides.
# rllm.* config values are propagated to verl-native keys at runtime by
# propagate_rllm_to_verl_config() in rllm/experimental/verl/utils.py.

defaults:
  - /ppo_trainer
  - _self_

actor_rollout_ref:
  rollout:
    mode: async
    agent:
      num_workers: 0
    val_kwargs:
      do_sample: True

data:
  gen_batch_size: ${mul:${data.train_batch_size},${rllm.rejection_sample.multiplier}}
  return_multi_modal_inputs: False

rllm:
  backend: verl
